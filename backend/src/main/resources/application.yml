spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:asistec}
    username: ${DB_USER:asistec}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
  jpa:
    hibernate:
      # El esquema lo maneja Liquibase; Hibernate solo valida que las entities
      # coincidan con lo que Liquibase creó (falla rápido si hay drift).
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
server:
  # Railway inyecta PORT en runtime; 8080 queda como default para dev/test local.
  port: ${PORT:8080}

logging:
  level:
    com.innovaschools: INFO
