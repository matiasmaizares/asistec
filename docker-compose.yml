services:
  postgres:
    image: postgres:16-alpine
    container_name: asistec-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-asistec}
      POSTGRES_USER: ${DB_USER:-asistec}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Definí DB_PASSWORD en tu .env (ver .env.example)}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - asistec_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-asistec} -d ${DB_NAME:-asistec}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: asistec-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  asistec_postgres_data:
